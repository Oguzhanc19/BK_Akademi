<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
    <title>Ödeme Yap | BKAkademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>

/* BKAkademi Premium Dark Theme Override for Tailwind */
:root {
  --bg-color: #0a0e27;
  --surface-color: rgba(15, 23, 42, 0.7);
  --border-color: rgba(255, 255, 255, 0.1);
  --accent-color: #6366f1;
}

body { min-height: 67vh; zoom: 1.5;   display: flex; flex-direction: column;         
  background-color: var(--bg-color) !important;
  color: #f8fafc !important;
  font-family: 'Plus Jakarta Sans', sans-serif !important;
  position: relative;
  overflow-x: hidden;
;   }

/* Background Effects */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
  z-index: -2;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  width: 500px;
  height: 500px;
  background: rgba(99, 102, 241, 0.1);
  border-radius: 50%;
  filter: blur(16px);
  top: -100px;
  left: -100px;
  z-index: -1;
  pointer-events: none;
}

/* Nav override */
nav {
  background: rgba(10, 14, 39, 0.8) !important;
  backdrop-filter: blur(16px) !important;
  border-bottom: 1px solid var(--border-color) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
}
nav a.text-2xl {
  color: #fff !important;
  font-family: 'Playfair Display', serif !important;
}
nav a.text-2xl span {
  color: var(--accent-color) !important;
  font-style: italic !important;
  text-shadow: 0 0 10px rgba(99,102,241,0.5) !important;
}
nav a.text-slate-600 {
  color: #94a3b8 !important;
}
nav a.text-slate-600:hover {
  color: #fff !important;
  text-shadow: 0 0 8px rgba(255,255,255,0.4) !important;
}

/* Typography Overrides */
h1, h2, h3 {
  font-family: 'Playfair Display', serif !important;
  color: #fff !important;
}
.text-slate-600, .text-slate-500, .text-gray-600, .text-gray-500 {
  color: #cbd5e1 !important;
}
.bg-slate-50, .bg-gray-50 {
  background-color: transparent !important;
}

/* Payment Card & Containers */
.bg-white {
  background: var(--surface-color) !important;
  backdrop-filter: blur(16px) !important;
  -webkit-backdrop-filter: blur(16px) !important;
  border: 1px solid var(--border-color) !important;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5) !important;
}

/* Form Elements */
label {
  color: #94a3b8 !important;
  font-weight: 700 !important;
  letter-spacing: 0.05em !important;
  font-family: 'Plus Jakarta Sans', sans-serif !important;
}
input[type="text"] {
  background: rgba(0, 0, 0, 0.2) !important;
  border: 1px solid var(--border-color) !important;
  color: #fff !important;
}
input[type="text"]:focus {
  border-color: var(--accent-color) !important;
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
}

/* Buttons */
button.bg-indigo-600 {
  background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  transition: all 0.3s !important;
}
button.bg-indigo-600:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6) !important;
}

/* Specific Payment Details Box */
.bg-indigo-50 {
  background: rgba(99, 102, 241, 0.1) !important;
  border: 1px solid rgba(99, 102, 241, 0.2) !important;
  border-radius: 12px !important;
}
.text-indigo-900, .text-indigo-600 {
  color: #a5b4fc !important;
}
.text-indigo-600.font-bold {
  color: #fbbf24 !important; /* Gold for price */
  text-shadow: 0 0 10px rgba(251, 191, 36, 0.4) !important;
}

/* Dividers */
.border-slate-200, .border-gray-200 {
  border-color: var(--border-color) !important;
}

/* Toast */
#toast {
  background: linear-gradient(135deg, #059669, #047857) !important;
  color: #fff !important;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
}
</style>

</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-lg">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Güvenli Ödeme</h2>
            <div class="text-blue-600 font-bold text-xl" id="price-display">₺0</div>
        </div>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-100">
            <p class="text-sm text-gray-500">Seçilen Paket:</p>
            <p class="text-lg font-bold text-blue-900" id="package-name-display">Yükleniyor...</p>
        </div>

        <form onsubmit="completePayment(event)">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Kart Üzerindeki İsim</label>
                <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="Ad Soyad" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Kart Numarası</label>
                <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="flex gap-4 mb-6">
                <div class="w-1/2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">SKT</label>
                    <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="AA/YY" required>
                </div>
                <div class="w-1/2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">CVC</label>
                    <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="123" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-900 text-white py-4 rounded-lg font-bold hover:bg-blue-800 transition">
                Ödemeyi Tamamla
            </button>
        </form>
    </div>

    <script>
        // Sayfa açılınca URL'den veya localStorage'dan hangi paketin seçildiğini anla
        const pendingPackage = localStorage.getItem('pendingPackage') || 'Pro Master';
        const pendingPrice = localStorage.getItem('pendingPrice') || '₺1200';

        document.getElementById('package-name-display').innerText = pendingPackage;
        document.getElementById('price-display').innerText = pendingPrice;

        function completePayment(e) {
            e.preventDefault();
            // Ödeme başarılı, kullanıcıyı "Eski/Paralı Üye" yap ve paketi ata
            localStorage.setItem('userStatus', 'existing');
            localStorage.setItem('activePackage', pendingPackage);
            
            alert('Ödeme Başarılı! Panelinize yönlendiriliyorsunuz.');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
