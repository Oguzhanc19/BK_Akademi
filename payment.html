<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
    <title>Ödeme Yap | BKAkademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-lg">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Güvenli Ödeme</h2>
            <div class="text-blue-600 font-bold text-xl" id="price-display">₺0</div>
        </div>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-100">
            <p class="text-sm text-gray-500">Seçilen Paket:</p>
            <p class="text-lg font-bold text-blue-900" id="package-name-display">Yükleniyor...</p>
        </div>

        <form onsubmit="completePayment(event)">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Kart Üzerindeki İsim</label>
                <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="Ad Soyad" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Kart Numarası</label>
                <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="flex gap-4 mb-6">
                <div class="w-1/2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">SKT</label>
                    <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="AA/YY" required>
                </div>
                <div class="w-1/2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">CVC</label>
                    <input type="text" class="w-full px-3 py-3 border rounded-lg" placeholder="123" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-900 text-white py-4 rounded-lg font-bold hover:bg-blue-800 transition">
                Ödemeyi Tamamla
            </button>
        </form>
    </div>

    <script>
        // Sayfa açılınca URL'den veya localStorage'dan hangi paketin seçildiğini anla
        const pendingPackage = localStorage.getItem('pendingPackage') || 'Pro Master';
        const pendingPrice = localStorage.getItem('pendingPrice') || '₺1200';

        document.getElementById('package-name-display').innerText = pendingPackage;
        document.getElementById('price-display').innerText = pendingPrice;

        function completePayment(e) {
            e.preventDefault();
            // Ödeme başarılı, kullanıcıyı "Eski/Paralı Üye" yap ve paketi ata
            localStorage.setItem('userStatus', 'existing');
            localStorage.setItem('activePackage', pendingPackage);
            
            alert('Ödeme Başarılı! Panelinize yönlendiriliyorsunuz.');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
