<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol | EnglishPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>

    <!-- Firebase CDN (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body class="h-screen flex bg-white">

    <div class="hidden md:flex w-1/2 relative bg-blue-900 overflow-hidden items-center justify-center">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80" 
             class="absolute inset-0 w-full h-full object-cover opacity-30">
        <div class="relative z-10 text-center px-10">
            <h2 class="text-4xl font-bold text-white mb-4 tracking-wider">Join the Club</h2>
            <div class="w-20 h-1 bg-green-400 mx-auto mb-6"></div>
            <p class="text-gray-300 text-lg">"The limits of my language mean the limits of my world."</p>
        </div>
    </div>

    <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-gray-50">
        <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-xl">
            <div class="text-center mb-8">
                <i class="fas fa-user-plus text-4xl text-green-500 mb-2"></i>
                <h2 class="text-2xl font-bold text-gray-800">Hesap Oluştur</h2>
                <p class="text-sm text-gray-500 mt-2">Ücretsiz üyeliğinizi hemen başlatın.</p>
            </div>
            
            <form onsubmit="handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Ad Soyad</label>
                    <input id="reg-name" type="text" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">E-posta</label>
                    <input id="reg-email" type="email" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Şifre</label>
                    <input id="reg-password" type="password" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50" required>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-700 transition shadow-lg transform active:scale-95 duration-200">
                    Kayıt Ol
                </button>
            </form>

            <div class="mt-4">
                <button onclick="handleGoogleRegister()" class="w-full border border-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-50 flex items-center justify-center gap-2 text-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                    Google ile Kayıt Ol / Giriş Yap
                </button>
            </div>

            <p id="reg-error" class="mt-3 text-sm text-red-500 text-center"></p>
            <div class="mt-6 text-center text-sm">
                <span class="text-gray-500">Zaten üye misiniz?</span>
                <a href="login.html" class="text-blue-600 font-bold hover:underline ml-1">Giriş Yap</a>
            </div>
        </div>
    </div>

    <script>
        function normalizeFirebaseError(err) {
            if (!err || !err.code) return err && err.message ? err.message : 'Bilinmeyen bir hata oluştu.';
            switch (err.code) {
                case 'auth/email-already-in-use':
                    return 'Bu e-posta adresi zaten kullanımda.';
                case 'auth/weak-password':
                    return 'Şifre en az 6 karakter olmalıdır.';
                case 'auth/operation-not-allowed':
                    return 'Bu giriş yöntemi bu proje için pasif. Firebase konsolundan ilgili sign-in methodunu aktif etmelisiniz.';
                default:
                    return err.message || 'Bir hata oluştu.';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const errorEl = document.getElementById('reg-error');
            errorEl.textContent = '';

            if (!name) {
                errorEl.textContent = 'Lütfen ad soyad alanını doldurun.';
                return;
            }

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: name });

                // Firestore içinde kullanıcı belgesi oluştur
                await db.collection('users').doc(cred.user.uid).set({
                    uid: cred.user.uid,
                    email,
                    displayName: name,
                    role: Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(email) ? 'admin' : 'student',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Yeni kullanıcıyı varsayılan olarak öğrenci paneline gönder
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Kayıt sırasında hata oluştu: ' + normalizeFirebaseError(err);
            }
        }

        async function handleGoogleRegister() {
            const errorEl = document.getElementById('reg-error');
            errorEl.textContent = '';
            const provider = new firebase.auth.GoogleAuthProvider();

            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Firestore kullanıcı dokümanı yoksa oluştur
                const userRef = db.collection('users').doc(user.uid);
                const snap = await userRef.get();
                if (!snap.exists) {
                    await userRef.set({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || '',
                        role: Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(user.email) ? 'admin' : 'student',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                // Adminse admin paneline, değilse dashboard'a
                if (Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Google ile kayıt/giriş sırasında hata oluştu: ' + normalizeFirebaseError(err);
            }
        }
    </script>
</body>
</html>
