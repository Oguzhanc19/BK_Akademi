<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap | EnglishPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>

    <!-- Firebase CDN (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body class="h-screen flex bg-white">

    <div class="hidden md:flex w-1/2 relative bg-gray-900 overflow-hidden items-center justify-center">
        <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80" 
             class="absolute inset-0 w-full h-full object-cover opacity-40">
        
        <div class="relative z-10 text-center px-10">
            <h2 class="text-4xl font-bold text-white mb-4 tracking-wider">Welcome Back</h2>
            <div class="w-20 h-1 bg-blue-500 mx-auto mb-6"></div>
            <p class="text-gray-300 text-lg italic">"A different language is a different vision of life."</p>
            <p class="text-blue-400 mt-2 font-semibold">- Federico Fellini</p>
        </div>
    </div>

    <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-gray-50">
        <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-xl">
            <div class="text-center mb-8">
                <i class="fas fa-graduation-cap text-4xl text-blue-600 mb-2"></i>
                <h2 class="text-2xl font-bold text-gray-800">EnglishPro Giriş</h2>
                <p class="text-sm text-gray-500 mt-2">Hesabınıza erişmek için bilgilerinizi girin.</p>
            </div>
            
            <form onsubmit="handleEmailLogin(event)">
                <div class="mb-5">
                    <label class="block text-gray-700 text-sm font-bold mb-2">E-posta</label>
                    <input id="login-email" type="email" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-gray-50" placeholder="ornek@email.com" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Şifre</label>
                    <input id="login-password" type="password" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="******" required>
                </div>
                <button type="submit" class="w-full bg-blue-900 text-white py-4 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg transform active:scale-95 duration-200">
                    Giriş Yap
                </button>
            </form>

            <div class="mt-4">
                <button onclick="handleGoogleLogin()" class="w-full border border-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-50 flex items-center justify-center gap-2 text-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                    Google ile Giriş Yap
                </button>
            </div>

            <p id="login-error" class="mt-3 text-sm text-red-500 text-center"></p>

            <div class="mt-6 text-center text-sm">
                <span class="text-gray-500">Hesabınız yok mu?</span>
                <a href="register.html" class="text-blue-600 font-bold hover:underline ml-1">Kayıt Ol</a>
            </div>
        </div>
    </div>

    <script>
        // Giriş yaptıktan sonra admin mi öğrenci mi olduğuna göre yönlendir
        function redirectAfterLogin(user) {
            const email = user.email || '';
            if (Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(email)) {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function handleEmailLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                redirectAfterLogin(cred.user);
            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Giriş sırasında hata oluştu: ' + (err.message || '');
            }
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Firestore içinde user dokümanı yoksa oluştur
                const userRef = db.collection('users').doc(user.uid);
                const snap = await userRef.get();
                if (!snap.exists) {
                    await userRef.set({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || '',
                        role: Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(user.email) ? 'admin' : 'student',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                redirectAfterLogin(user);
            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Google ile giriş sırasında hata oluştu: ' + (err.message || '');
            }
        }
    </script>
</body>
</html>
