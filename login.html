<script>
// Erişim kodu kontrolü - kod doğrulanınca login formu açılır
async function checkAccessCode() {
  const code = document.getElementById('aw-code').value.trim().toUpperCase();
  const errEl = document.getElementById('aw-error');
  errEl.style.display = 'none';

  if (!code) {
    errEl.style.display = 'block';
    errEl.textContent = 'Lütfen erişim kodunu girin.';
    return;
  }

  try {
    const snap = await db.collection('accessCodes').where('code', '==', code).get();
    if (snap.empty) {
      errEl.style.display = 'block';
      errEl.textContent = 'Geçersiz erişim kodu. Lütfen tekrar deneyin.';
      return;
    }

    // Kod geçerli - access wall'u kaldır, login formunu göster
    document.getElementById('access-wall').style.display = 'none';
    sessionStorage.setItem('access_verified', 'true');
  } catch (e) {
    errEl.style.display = 'block';
    errEl.textContent = 'Bağlantı hatası. Tekrar deneyin.';
  }
}

// Enter tuşu ile doğrulama
document.addEventListener('DOMContentLoaded', function() {
  const awInput = document.getElementById('aw-code');
  if (awInput) {
    awInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkAccessCode();
    });
  }
  // Daha önce doğrulanmışsa access wall'u atla
  if (sessionStorage.getItem('access_verified') === 'true') {
    const wall = document.getElementById('access-wall');
    if (wall) wall.style.display = 'none';
  }
});
</script>

<script>
// Tab switching
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('ff-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('ff-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('err').style.display = 'none';
  document.getElementById('err-reg').style.display = 'none';
}

// Auth state - redirect if already logged in
auth.onAuthStateChanged(u => { 
  if(u) red(u); 
});

function red(u){
  window.location.href = Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(u.email) ? 'admin.html' : 'dashboard.html';
}

// LOGIN
async function doLogin(e){
  e.preventDefault();
  const err = document.getElementById('err');
  err.style.display='none';
  err.textContent='';
  
  const em = document.getElementById('email').value.trim();
  const pw = document.getElementById('pass').value;

  try {
    const c = await auth.signInWithEmailAndPassword(em, pw);
    await verifyAndEnter(c.user, err);
  } catch(e) {
    err.style.display='block';
    err.innerHTML='<i class="fas fa-exclamation-triangle"></i> E-posta veya şifre hatalı.';
  }
}

// REGISTER
async function doRegister(e){
  e.preventDefault();
  const err = document.getElementById('err-reg');
  err.style.display='none';
  
  const name = document.getElementById('reg-name').value.trim();
  const em = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-pass').value;
  const pw2 = document.getElementById('reg-pass2').value;
  const code = document.getElementById('reg-code').value.trim().toUpperCase();

  if(pw !== pw2) {
    err.style.display='block';
    err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Şifreler eşleşmiyor.';
    return;
  }
  if(pw.length < 6) {
    err.style.display='block';
    err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Şifre en az 6 karakter olmalıdır.';
    return;
  }

  try {
    const codeSnap = await db.collection('accessCodes').where('code', '==', code).get();
    if(codeSnap.empty){
      err.style.display='block';
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Geçersiz erişim kodu.';
      return;
    }
    const codeDoc = codeSnap.docs[0];
    const codeData = codeDoc.data();

    if(codeData.isUsed){
      err.style.display='block';
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Bu erişim kodu daha önce kullanılmış.';
      return;
    }

    if(codeData.email && codeData.email.toLowerCase() !== em.toLowerCase()){
      err.style.display='block';
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Bu erişim kodu bu e-posta adresi için geçerli değil.';
      return;
    }

    const cred = await auth.createUserWithEmailAndPassword(em, pw);
    await cred.user.updateProfile({ displayName: name });
    
    err.style.display='block';
    err.style.color='#059669';
    err.style.background='rgba(16, 185, 129, 0.1)';
    err.innerHTML='<i class="fas fa-check-circle"></i> Kayıt başarılı! Yönlendiriliyorsunuz...';
    
    setTimeout(() => verifyAndEnter(cred.user, err, codeDoc.id), 1200);

  } catch(e) {
    err.style.display='block';
    if(e.code === 'auth/email-already-in-use') {
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Bu e-posta adresi zaten kayıtlı. Giriş yapmayı deneyin.';
    } else {
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Kayıt hatası: ' + e.message;
    }
  }
}

// GOOGLE (both login & register)
const googleProvider = new firebase.auth.GoogleAuthProvider();
async function doGoogle(mode){
  const err = document.getElementById(mode === 'register' ? 'err-reg' : 'err');
  err.style.display='none';
  err.textContent='';
  let codeDocId = null;

  if (mode === 'register') {
    const code = document.getElementById('reg-code').value.trim().toUpperCase();
    if(!code){
      err.style.display='block';
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Google ile kayıt olmadan önce lütfen erişim kodunuzu girin.';
      return;
    }
    
    try {
      const codeSnap = await db.collection('accessCodes').where('code', '==', code).get();
      if(codeSnap.empty){
        err.style.display='block';
        err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Geçersiz erişim kodu.';
        return;
      }
      const codeDoc = codeSnap.docs[0];
      const codeData = codeDoc.data();

      if(codeData.isUsed){
        err.style.display='block';
        err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Bu erişim kodu daha önce kullanılmış.';
        return;
      }
      codeDocId = codeDoc.id;
    } catch(e) {
      err.style.display='block';
      err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Kod kontrolü yapılamadı.';
      return;
    }
  }

  // Loading göstergesi
  err.style.display='block';
  err.style.color='var(--accent)';
  err.style.background='rgba(99, 102, 241, 0.1)';
  err.style.border='1px solid rgba(99, 102, 241, 0.2)';
  err.innerHTML='<i class="fas fa-spinner fa-spin"></i> Google hesabınıza bağlanılıyor...';

  try {
    const r = await auth.signInWithPopup(googleProvider);
    
    err.innerHTML='<i class="fas fa-spinner fa-spin"></i> Giriş yapılıyor...';

    if (mode === 'register' && codeDocId) {
      const codeDoc = await db.collection('accessCodes').doc(codeDocId).get();
      const codeData = codeDoc.data();
      if(codeData.email && codeData.email.toLowerCase() !== r.user.email.toLowerCase()){
        await auth.signOut();
        err.style.color='#ef4444';
        err.style.background='rgba(239, 68, 68, 0.1)';
        err.style.border='1px solid rgba(239, 68, 68, 0.2)';
        err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Bu erişim kodu bu e-posta adresi için geçerli değil.';
        return;
      }
    }
    await verifyAndEnter(r.user, err, codeDocId);
  } catch(e) {
    err.style.color='#ef4444';
    err.style.background='rgba(239, 68, 68, 0.1)';
    err.style.border='1px solid rgba(239, 68, 68, 0.2)';
    err.innerHTML='<i class="fas fa-exclamation-triangle"></i> Google ile işlem başarısız. Popup engellenmiş olabilir.';
  }
}

// Verify and enter (shared for login/register/Google)
async function verifyAndEnter(user, errEl, codeDocId) {
  try {
    const isAdmin = Array.isArray(window.ADMIN_EMAILS) && window.ADMIN_EMAILS.includes(user.email);
    
    const ref = db.collection('users').doc(user.uid);
    
    try {
      const doc = await ref.get();
      
      if(!doc.exists) {
        await ref.set({
          uid: user.uid,
          email: user.email,
          displayName: user.displayName || '',
          role: isAdmin ? 'admin' : 'student',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      
      if (codeDocId) {
        try {
          await db.collection('accessCodes').doc(codeDocId).update({
            isUsed: true,
            usedBy: user.uid
          });
        } catch(codeErr) {
          console.warn('Erişim kodu güncellenemedi:', codeErr);
        }
      }
    } catch(dbErr) {
      console.warn('Kullanıcı profili yazılamadı, giriş devam ediyor:', dbErr);
    }
    
    // Firestore yazma hatası olsa bile girişe devam et
    red(user);
  } catch(error) {
    console.error("Giriş hatası:", error);
    // Yine de girişe devam et
    red(user);
  }
}
