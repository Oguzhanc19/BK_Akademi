<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <title>Admin Hesabı Oluşturuluyor...</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body style="background: #0a0e27; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column;">

    <h2 id="status">Hesap Oluşturuluyor, lütfen bekleyin...</h2>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const email = "admin2@gmail.com";
            const password = "123456";
            
            try {
                // Try to create the user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // Add to Firestore database
                await db.collection('users').doc(userCredential.user.uid).set({
                    uid: userCredential.user.uid,
                    email: userCredential.user.email,
                    displayName: "Admin Oğuzhan",
                    role: "admin",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Admin erişim kodunu (BKA2026) oluştur
                try {
                    const codeRef = db.collection('accessCodes').doc('ADMIN_MASTER_CODE');
                    await codeRef.set({
                        code: "BKA2026",
                        email: "admin@bkakademi.com", // Sadece referans için
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        used: false,
                        createdBy: userCredential ? userCredential.user.uid : "setup_script",
                        type: "master"
                    });
                    console.log("Master kod BKA2026 başarıyla oluşturuldu.");
                } catch(err) {
                    console.error("Kod oluşturma hatası: ", err);
                }


                document.getElementById('status').innerText = "Hesap başarıyla oluşturuldu! Admin paneline yönlendiriliyorsunuz...";
                
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 2000);
            } catch (error) {
                // If account already exists
                if(error.code === 'auth/email-already-in-use') {
                    document.getElementById('status').innerText = "Bu hesap zaten var. Giriş yapılıyor...";
                    try {
                        await auth.signInWithEmailAndPassword(email, password);

                        // Ensure master code is created even if account exists
                        try {
                            const codeRef = db.collection('accessCodes').doc('ADMIN_MASTER_CODE');
                            await codeRef.set({
                                code: "BKA2026",
                                email: "admin@bkakademi.com",
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                used: false,
                                createdBy: auth.currentUser ? auth.currentUser.uid : "setup_script",
                                type: "master"
                            });
                            console.log("Master kod BKA2026 başarıyla doğrulandı.");
                        } catch(err) {
                            console.error("Kod oluşturma hatası: ", err);
                        }

                        window.location.href = "admin.html";
                    } catch (e) {
                        document.getElementById('status').innerText = "Giriş hatası: Şifreniz farklı olabilir. Lütfen login.html sayfasına giderek manuel giriş yapın.";
                    }
                } else {
                    document.getElementById('status').innerText = "Hata: " + error.message;
                }
            }
        });
    </script>
</body>
</html>
